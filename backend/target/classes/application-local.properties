# Local Development Config
server.port=8080
server.servlet.context-path=/api

spring.datasource.url=jdbc:mysql://localhost:3307/saerp_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1978
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

jwt.secret=saerp-super-secret-key-for-jwt-authentication-min-256bits-long-dev
jwt.expiration=86400000

aes.secret=saerp-aes-key-32ch
aes.iv=saerp-aes-iv-16c

mail.enabled=false
app.frontend-url=http://localhost:5173
